[package]
name = "kish"
version = "0.1.0"
edition = "2024"

[dependencies]
nix = { version = "0.31", features = ["signal", "process", "fs", "poll", "term"] }
libc = "0.2"
crossterm = "0.29"
libloading = "0.8"
toml = "0.8"
serde = { version = "1", features = ["derive"] }
kish-plugin-api = { path = "crates/kish-plugin-api" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
crossterm = "0.29"
expectrl = "0.8"

[[bench]]
name = "lexer_bench"
harness = false

[[bench]]
name = "parser_bench"
harness = false

[[bench]]
name = "expand_bench"
harness = false
